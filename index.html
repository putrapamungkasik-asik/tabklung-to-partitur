<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABK31 Mobile | by: Kang Putra Angklung</title>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #020617; --panel: #1e293b; --accent: #2dd4bf; --gold: #fbbf24; 
            --danger: #ff4757; --success: #22c55e; --card: #0f172a; --gray: #475569;
            --orange: #e67e22; --deep-orange: #d35400;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: #f8fafc; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header Mobile */
        .app-header { 
            padding: 12px 15px; 
            background: var(--panel); 
            border-bottom: 2px solid var(--gold);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
        }
        .app-logo { height: 35px; }
        .song-title-input { 
            background: #000; border: 1px solid var(--gray); color: var(--gold); 
            padding: 8px; border-radius: 6px; font-weight: bold; width: 100%; 
            font-size: 14px; outline: none;
        }

        /* Toolbar Atas - Scrollable */
        .top-toolbar { 
            display: flex; 
            overflow-x: auto; 
            padding: 10px; 
            gap: 8px; 
            background: #0f172a; 
            border-bottom: 1px solid #334155;
            scrollbar-width: none;
        }
        .top-toolbar::-webkit-scrollbar { display: none; }
        
        .btn-tool { 
            white-space: nowrap; border: none; color: white; padding: 10px 14px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; 
        }

        /* Main Content */
        .main-content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px;
            padding-bottom: 120px; /* Space for playback control */
        }

        /* Bar Card Mobile */
        .section-box { margin-bottom: 25px; }
        .group-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 12px; background: #1e293b; padding: 10px; border-radius: 8px;
        }
        
        .bar-card { 
            background: #0f172a; padding: 12px; border-radius: 12px; 
            margin-top: 15px; border: 2px solid #334155; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .active-playing { border-color: var(--gold) !important; background: #1e294b !important; }

        /* Grid Scrollable */
        .grid-container { 
            overflow-x: auto; 
            margin-top: 10px;
            padding-bottom: 5px;
        }
        .grid-row { display: flex; gap: 4px; margin-bottom: 6px; align-items: center; width: max-content; }
        
        .grid-cell { 
            width: 45px; height: 45px; /* Touch friendly size */
            border: 1px solid #1e293b; text-align: center; font-weight: bold; 
            border-radius: 6px; font-size: 14px; outline: none; background: #000; 
            color: #fff; font-family: 'Courier New', monospace;
        }
        .grid-cell.selected { background-color: rgba(251, 191, 36, 0.4) !important; border: 1px solid var(--gold) !important; }
        
        .btn-shift { 
            background: #334155; color: white; border: none; border-radius: 6px; 
            width: 35px; height: 45px; font-size: 14px; flex-shrink: 0;
        }

        /* Control Panel Bawah */
        .bottom-controls {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--panel); border-top: 2px solid var(--gold);
            padding: 15px; display: flex; flex-direction: column; gap: 10px;
            z-index: 1000;
        }
        .playback-row { display: flex; gap: 10px; }
        .timeline-container { display: flex; align-items: center; gap: 10px; width: 100%; }
        .slider-wrapper { flex: 1; position: relative; height: 10px; background: var(--gray); border-radius: 5px; }
        #playback-slider { -webkit-appearance: none; width: 100%; height: 100%; background: transparent; position: absolute; z-index: 5; margin: 0; top:0; }
        #playback-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #fff; border: 3px solid var(--gold); border-radius: 50%; }
        .slider-progress { position: absolute; height: 100%; background: var(--gold); border-radius: 5px; pointer-events: none; width: 0%; top:0; }

        /* Autocomplete Mobile */
        #autocomplete-box {
            position: fixed; background: #1e293b; border: 2px solid var(--gold);
            border-radius: 12px; z-index: 2000; display: none; 
            box-shadow: 0 -5px 25px rgba(0,0,0,0.8);
            max-height: 250px; overflow-y: auto; width: 90%; left: 5% !important; bottom: 130px; top: auto !important;
        }
        .suggest-item {
            padding: 15px; cursor: pointer; font-size: 16px; color: white;
            border-bottom: 1px solid #334155; text-align: center; font-weight: bold;
        }
        .suggest-item:active { background: var(--gold); color: black; }

        /* Settings Row */
        .settings-row { display: flex; gap: 10px; align-items: center; overflow-x: auto; padding-bottom: 5px; }
        .key-select { background: #000; color: var(--gold); border: 1px solid var(--gold); border-radius: 6px; padding: 8px; font-size: 12px; }
        .bpm-input { width: 70px; background: #000; color: var(--gold); border: 1px solid var(--gold); border-radius: 6px; padding: 8px; text-align: center; }

        .btn-mode { border: none; background: #334155; color: white; padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .btn-mode.active { background: var(--gold); color: black; }

        .layer-selector { background: #000; color: var(--accent); border: 1px solid #334155; border-radius: 6px; padding: 5px; font-size: 11px; }

        /* Helpers */
        .beat-1 { background: #0f172a; } 
        .beat-2 { background: #1e293b; }
    </style>
</head>
<body>

<div id="autocomplete-box"></div>

<div class="app-header">
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjvm4FDE7tagy8ZtWyfy_pzRnB9D8orAO_5EwH5sBbJOC3JIOlGweg5XCwhWQZbY8xVIFTbMpojvtX3X-BZv_xfrvjzIkXn3-RYIwFJMhOnM-y0YaO8JZocqYoFmq4NSdHwsPzAp8kIjzfFtCL8KrgDiueLZRhApll7tvcTmeRS6lcBtjEK4ZthgkS7rmI/s320/kang_putra__1_-removebg-preview.png" class="app-logo">
    <input type="text" id="song-title" class="song-title-input" placeholder="Judul Lagu..." oninput="app.save()">
</div>

<div class="top-toolbar">
    <button class="btn-tool" style="background:#3b82f6;" onclick="app.exportData()">💾 Save</button>
    <button class="btn-tool" style="background:#6366f1;" onclick="document.getElementById('importFile').click()">📂 Load</button>
    <button class="btn-tool" style="background:#8b5cf6;" onclick="document.getElementById('midiFile').click()">🎹 MIDI</button>
    <div style="width:1px; background:#334155; margin: 0 5px;"></div>
    <button id="mode-piano" class="btn-mode active" onclick="app.setDisplayMode('piano')">Piano</button>
    <button id="mode-solfege" class="btn-mode" onclick="app.setDisplayMode('solfege')">123</button>
    <select id="key-base" class="key-select" onchange="app.setKeyBase(this.value)">
        <option value="0">Do=C</option><option value="1">Do=C#</option><option value="2">Do=D</option>
        <option value="3">Do=D#</option><option value="4">Do=E</option><option value="5">Do=F</option>
        <option value="6">Do=F#</option><option value="7">Do=G</option><option value="8">Do=G#</option>
        <option value="9">Do=A</option><option value="10">Do=A#</option><option value="11">Do=B</option>
    </select>
    <input type="number" id="tempo" class="bpm-input" value="0.40" step="0.01" oninput="app.save()">
    <input type="file" id="importFile" style="display:none" onchange="app.importData(event)">
    <input type="file" id="midiFile" style="display:none" onchange="app.importMIDI(event)">
</div>

<div class="main-content">
    <div id="sections-container"></div>
    <button onclick="app.addSection()" style="width:100%; padding:20px; background:var(--gold); border:none; font-weight:bold; border-radius:15px; cursor:pointer; color:black; margin-top:10px; font-size: 14px;">+ GRUP MUSIK BARU</button>
</div>

<div class="bottom-controls">
    <div class="timeline-container">
        <span style="font-family:monospace; color:var(--gold); font-size:12px;" id="time-current">00:00</span>
        <div class="slider-wrapper">
            <div class="slider-progress" id="slider-fill"></div>
            <input type="range" id="playback-slider" value="0" min="0" step="1" oninput="app.seek(this.value)">
        </div>
    </div>
    <div class="playback-row">
        <button id="play-btn" onclick="app.play()" style="flex:2; padding:15px; background:var(--success); border:none; color:white; font-weight:bold; border-radius:12px; font-size: 16px;">▶ PLAY</button>
        <button onclick="app.stop()" style="flex:1; padding:15px; background:var(--danger); border:none; color:white; font-weight:bold; border-radius:12px; font-size: 16px;">■</button>
    </div>
</div>

<script>
const app = {
    sections: [], timeline: [], isPlaying: false, audio: null,
    startTime: 0, pauseOffset: 0, currentBarIdx: -1, lastStep: -1,
    selection: { start: null, end: null, active: false }, clipboard: null,
    displayMode: 'piano', keyBase: 0, playLimitStep: -1,
    noteList: ["C4","C#4","D4","D#4","E4","F4","F#4","G4","G#4","A4","A#4","B4","C5","C#5","D5","D#5","E5","F5","F#5","G5","G#5","A5","A#5","B5","C6","C#6","D6","D#6","E6","F6","F#6","G6","G#6","A6","A#6","B6","C7","C#7","D7","D#7","E7"],
    solfegeMap: { 0: "1", 1: "1\u0338", 2: "2", 3: "2\u0338", 4: "3", 5: "4", 6: "4\u0338", 7: "5", 8: "5\u0338", 9: "6", 10: "6\u0338", 11: "7" },
    noteColors: { 'C': '#FF0000', 'C#': '#FF8C00', 'D': '#FFD700', 'D#': '#ADFF2F', 'E': '#00FF00', 'F': '#00FA9A', 'F#': '#00FFFF', 'G': '#1E90FF', 'G#': '#0000FF', 'A': '#8A2BE2', 'A#': '#9400D3', 'B': '#FF1493' },

    init() {
        const saved = JSON.parse(localStorage.getItem('tabklung_v11.7_mobile'));
        if(saved) {
            this.sections = saved.sections;
            this.keyBase = saved.keyBase || 0;
            this.displayMode = saved.displayMode || 'piano';
            document.getElementById('key-base').value = this.keyBase;
            document.getElementById('song-title').value = saved.songTitle || "";
            document.getElementById('tempo').value = saved.tempo || "0.40";
        } else { this.addSection(); }
        this.rebuildTimeline(); this.renderAll(); this.initEvents();
    },

    numToSmartDisplay(n) {
        if(!n || isNaN(n)) return n;
        if(this.displayMode === 'piano') return this.numToSolfege(n);
        let val = parseInt(n);
        let relativeNote = val - (60 + this.keyBase);
        let octave = Math.floor(relativeNote / 12);
        let noteInOctave = ((relativeNote % 12) + 12) % 12;
        let baseNum = this.solfegeMap[noteInOctave];
        if (octave > 0) return baseNum + ".".repeat(octave);
        if (octave < 0) return baseNum + "\u0323".repeat(Math.abs(octave));
        return baseNum;
    },

    playTone(f) { 
        if(!this.audio) this.audio = new AudioContext();
        const o = this.audio.createOscillator(), g = this.audio.createGain(); 
        o.type='triangle'; o.frequency.value=f; 
        g.gain.setValueAtTime(0, this.audio.currentTime); 
        g.gain.linearRampToValueAtTime(0.2, this.audio.currentTime+0.01); 
        g.gain.exponentialRampToValueAtTime(0.0001, this.audio.currentTime+0.6); 
        o.connect(g); g.connect(this.audio.destination); 
        o.start(); o.stop(this.audio.currentTime+0.6); 
    },

    syncLoop() {
        if(!this.isPlaying) return;
        const tempo = parseFloat(document.getElementById('tempo').value);
        const elapsed = this.audio.currentTime - this.startTime;
        const step = Math.floor(elapsed / tempo);
        if (this.playLimitStep !== -1 && step >= this.playLimitStep) { this.stop(); return; }
        const barIdx = Math.floor(step / 16);
        const subStep = step % 16;
        if(barIdx >= this.timeline.length) { this.stop(); return; }
        
        document.getElementById('playback-slider').value = step;
        document.getElementById('slider-fill').style.width = (step / (document.getElementById('playback-slider').max || 1) * 100) + '%';
        
        if(barIdx !== this.currentBarIdx) { 
            this.currentBarIdx = barIdx; 
            document.querySelectorAll('.bar-card').forEach(c => c.classList.remove('active-playing'));
            const activeCard = document.getElementById(`bar-card-${this.timeline[barIdx].id}`);
            if(activeCard) {
                activeCard.classList.add('active-playing');
                activeCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
        
        if(step !== this.lastStep) {
            this.lastStep = step;
            const bar = this.getBarById(this.timeline[barIdx].id);
            for(let r=0; r<5; r++) {
                if(bar.grid[r][subStep]) {
                    const midiNote = parseInt(bar.grid[r][subStep]);
                    const freq = 261.63 * Math.pow(2, (midiNote - 60) / 12);
                    this.playTone(freq);
                }
            }
        }
        requestAnimationFrame(() => this.syncLoop());
    },

    async importMIDI(e) {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = async (x) => {
            const midi = new Midi(x.target.result);
            const sps = (60/(midi.header.tempos[0]?.bpm || 120))/4;
            document.getElementById('tempo').value = sps.toFixed(3);
            let notes = [];
            midi.tracks.forEach(t => t.notes.forEach(n => notes.push({midi: n.midi, step: Math.round(n.time / sps)})));
            this.sections = [{ id: Date.now(), name: "MIDI IMPORT", bars: [], collapsed: false }];
            notes.sort((a,b) => a.step - b.step).forEach(n => {
                let m = n.midi; while (m < 55) m += 12; while (m > 85) m -= 12; 
                if (m >= 55 && m <= 85) {
                    let bIdx = Math.floor(n.step / 16), sStep = n.step % 16;
                    while(this.sections[0].bars.length <= bIdx) {
                        this.sections[0].bars.push({ id: Date.now()+this.sections[0].bars.length, name: "", grid: Array(6).fill().map(() => Array(16).fill('')) });
                    }
                    let bar = this.sections[0].bars[bIdx];
                    for(let r=0; r<5; r++) if(bar.grid[r][sStep] === "") { bar.grid[r][sStep] = m.toString(); break; }
                }
            });
            this.sections[0].bars.forEach(b => this.sortNotesInBar(b));
            this.rebuildTimeline(); this.renderAll(); this.save();
            alert("MIDI Diimpor!");
        };
        reader.readAsArrayBuffer(file);
    },

    quantizeToAngklung(bId, mode = 'all') {
        const bar = this.getBarById(bId); if (!bar) return;
        const anchorPoints = [0, 4, 8, 12];
        let rowsToProcess = (mode === 'exclude-l1') ? [1,2,3,4] : (mode === 'l1-only' ? [0] : [0,1,2,3,4]);
        anchorPoints.forEach(point => {
            let uniqueNotes = new Set();
            for (let c = point; c < point + 4; c++) { rowsToProcess.forEach(r => { if (bar.grid[r][c]) { uniqueNotes.add(bar.grid[r][c]); bar.grid[r][c] = ""; } }); }
            let sortedNotes = Array.from(uniqueNotes).sort((a, b) => b - a);
            sortedNotes.forEach((note, idx) => { if (idx < rowsToProcess.length) { bar.grid[rowsToProcess[idx]][point] = note; } });
        });
        this.renderAll(); this.save();
    },

    doubleOctave(bId) {
        const bar = this.getBarById(bId); if (!bar) return;
        for (let c = 0; c < 16; c++) {
            let colNotes = [];
            for (let r = 0; r < 5; r++) if (bar.grid[r][c]) colNotes.push(parseInt(bar.grid[r][c]));
            colNotes.forEach(n => {
                let low = n - 12;
                if (low >= 36 && !colNotes.includes(low)) {
                    for (let r = 0; r < 5; r++) if (bar.grid[r][c] === "") { bar.grid[r][c] = low.toString(); colNotes.push(low); break; }
                }
            });
        }
        this.sortNotesInBar(bar); this.renderAll(); this.save();
    },

    autoChord(bId) {
        const bar = this.getBarById(bId); if (!bar) return;
        const notesMap = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        let lastDetected = "";
        for (let col = 0; col < 16; col++) {
            let notesInCol = [];
            for (let r = 0; r < 5; r++) if (bar.grid[r][col]) {
                let noteNum = parseInt(bar.grid[r][col]);
                let noteName = notesMap[(noteNum) % 12];
                if (!notesInCol.includes(noteName)) notesInCol.push(noteName);
            }
            if (notesInCol.length > 0) {
                let detected = this.guessChord(notesInCol);
                if (detected !== lastDetected) { bar.grid[5][col] = detected; lastDetected = detected; } 
                else { bar.grid[5][col] = ""; }
            } else { bar.grid[5][col] = ""; lastDetected = ""; }
        }
        this.renderAll(); this.save();
    },

    guessChord(notes) {
        const chords = { "C":["C","E","G"], "Cm":["C","D#","G"], "D":["D","F#","A"], "Dm":["D","F","A"], "E":["E","G#","B"], "Em":["E","G","B"], "F":["F","A","C"], "Fm":["F","G#","C"], "G":["G","B","D"], "Gm":["G","A#","D"], "A":["A","C#","E"], "Am":["A","C","E"], "B":["B","D#","F#"], "Bm":["B","D","F#"] };
        for (let name in chords) { if (chords[name].every(n => notes.includes(n))) return name; }
        return notes[0];
    },

    renderAll() {
        const container = document.getElementById('sections-container');
        container.innerHTML = this.sections.map(s => `
            <div class="section-box">
                <div class="group-header">
                    <input value="${s.name}" oninput="app.updateSecName(${s.id}, this.value)" style="background:transparent; border:none; color:white; font-weight:bold; font-size:16px; outline:none; width: 120px;">
                    <div style="display:flex; gap:8px;">
                        <button class="btn-tool" style="background:var(--accent); color:black;" onclick="app.addBar(${s.id})">+ BAR</button>
                        <button class="btn-tool" style="background:var(--danger);" onclick="app.deleteSec(${s.id})">×</button>
                    </div>
                </div>
                <div class="bar-content">
                    ${s.bars.map((b, bIdx) => `
                        <div class="bar-card" id="bar-card-${b.id}">
                            <div style="display:flex; gap:8px; margin-bottom:12px; align-items:center; overflow-x:auto; padding-bottom:5px;">
                                <span style="font-size:12px; color:var(--gold); font-weight:bold; white-space:nowrap;">${b.name || 'BAR ' + (bIdx + 1)}</span>
                                <button class="btn-tool" style="background:var(--deep-orange); padding:6px 10px;" onclick="app.manualSort(${b.id})">SORT</button>
                                <button class="btn-tool" style="background:var(--accent); color:black; padding:6px 10px;" onclick="app.doubleOctave(${b.id})">DBL</button>
                                <button class="btn-tool" style="background:#8b5cf6; padding:6px 10px;" onclick="app.autoChord(${b.id})">CHRD</button>
                                <select id="sel-layer-${b.id}" class="layer-selector">
                                    <option value="all">Semua</option>
                                    <option value="exclude-l1">Ex L1</option>
                                    <option value="l1-only">L1 Only</option>
                                </select>
                                <button class="btn-tool" style="background:var(--orange); padding:6px 10px;" onclick="app.quantizeToAngklung(${b.id}, document.getElementById('sel-layer-${b.id}').value)">Q</button>
                                <button class="btn-tool" style="background:var(--success); color:black; padding:6px 10px;" onclick="app.playSingleBar(${b.id})">TRY</button>
                                <button onclick="app.deleteBar(${s.id}, ${b.id})" style="border:none; color:var(--danger); background:none; font-size:18px; margin-left:10px;">×</button>
                            </div>
                            <div class="grid-container">
                                ${b.grid.map((row, rIdx) => `
                                    <div class="grid-row">
                                        <button class="btn-shift" onclick="app.shift(${b.id}, ${rIdx}, 'L')">«</button>
                                        <button class="btn-shift" onclick="app.shift(${b.id}, ${rIdx}, 'R')">»</button>
                                        <span style="width:20px; font-size:10px; color:#64748b; text-align:center;">${rIdx==5?'CH':(rIdx+1)}</span>
                                        ${row.map((cell, cIdx) => {
                                            const beatClass = (Math.floor(cIdx / 4) % 2 === 0) ? 'beat-1' : 'beat-2';
                                            return `<input class="grid-cell ${beatClass}" data-loc="${s.id}-${b.id}-${rIdx}-${cIdx}" readonly style="${this.getCellStyle(cell, rIdx==5)}" 
                                            value="${rIdx==5 ? cell : this.numToSmartDisplay(cell)}" 
                                            onclick="app.handleInput(this, ${s.id}, ${b.id}, ${rIdx}, ${cIdx})">`;
                                        }).join('')}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    },

    numToSolfege(n) { 
        if(!n || isNaN(n)) return n; 
        const notes = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"]; 
        let v=parseInt(n), oct=Math.floor(v/12)-1, idx=v%12; return notes[idx]+oct; 
    },

    solfegeToNum(s) { 
        if(!s) return "";
        if (s.match(/[A-G]/i)) {
            const m = {"C":0,"C#":1,"D":2,"D#":3,"E":4,"F":5,"F#":6,"G":7,"G#":8,"A":9,"A#":10,"B":11}; 
            let match=s.match(/([A-G]#?)(\d)/i); 
            if(match) return (m[match[1].toUpperCase()]+(parseInt(match[2])+1)*12).toString(); 
            return s;
        }
        const chromaticMap = { "1/":1, "1\\":1, "2/":3, "2\\":3, "4/":6, "4\\":6, "5/":8, "5\\":8, "6/":10, "6\\":10 };
        const baseMap = { "1":0, "2":2, "3":4, "4":5, "5":7, "6":9, "7":11 };
        let clean = s.replace(/[\.\u0323]/g, '');
        let octave = (s.split('.').length - 1) - (s.split('\u0323').length - 1);
        let semi = baseMap[clean[0]] || 0;
        if (chromaticMap[clean]) semi = chromaticMap[clean];
        return (60 + this.keyBase + semi + (octave * 12)).toString();
    },

    getCellStyle(val, isChord) { 
        if(!val) return ""; 
        if(isChord) return "background:#fbbf2433 !important; color:var(--gold); border-color:var(--gold);"; 
        const n = this.numToSolfege(val).replace(/[0-9-]/g,''); 
        const c = this.noteColors[n] || '#fff'; 
        return `background:${c}44 !important; color:${c}; border-color:${c}aa;`; 
    },

    initEvents() {
        window.onclick = (e) => { if(!e.target.classList.contains('grid-cell')) this.hideAutocomplete(); };
    },

    handleInput(el, sId, bId, r, c) {
        if(r === 5) {
            let ch = prompt("Masukkan Nama Chord:", el.value);
            if(ch !== null) { el.value = ch.toUpperCase(); this.updateGrid(bId, r, c, el.value); }
            return;
        }
        
        // Special Mobile: Clear cell if clicked while already having value (Double click feel)
        if(el.value !== "" && this.lastClicked === el) {
             el.value = ""; this.updateGrid(bId, r, c, ""); this.hideAutocomplete();
             this.lastClicked = null; return;
        }
        this.lastClicked = el;

        let options = [];
        if (this.displayMode === 'piano') {
            options = this.noteList.slice(12, 36); // Common range
        } else {
            const base = ["1","1\u0338","2","2\u0338","3","4","4\u0338","5","5\u0338","6","6\u0338","7"];
            base.forEach(n => {
                options.push(n + "\u0323"); // Rendah
                options.push(n);           // Polos
                options.push(n + ".");     // Tinggi
            });
        }

        this.showAutocomplete(el, options, (selected) => {
            el.value = selected;
            this.updateGrid(bId, r, c, selected);
            this.hideAutocomplete();
        });
    },

    showAutocomplete(target, list, onSelect) {
        const box = document.getElementById('autocomplete-box');
        box.style.display = 'block';
        box.innerHTML = `<div class="suggest-item" style="color:var(--danger)">HAPUS NADA</div>` + 
                         list.map(item => `<div class="suggest-item">${item}</div>`).join('');
        box.querySelectorAll('.suggest-item').forEach((item, idx) => { 
            item.onclick = (e) => { 
                e.stopPropagation();
                if(idx === 0) onSelect(""); else onSelect(list[idx-1]); 
            }; 
        });
    },

    hideAutocomplete() { document.getElementById('autocomplete-box').style.display = 'none'; },
    setDisplayMode(m) { this.displayMode = m; document.getElementById('mode-piano').classList.toggle('active', m === 'piano'); document.getElementById('mode-solfege').classList.toggle('active', m === 'solfege'); this.renderAll(); this.save(); },
    setKeyBase(v) { this.keyBase = parseInt(v); this.renderAll(); this.save(); },
    addSection() { const id = Date.now(); this.sections.push({ id, name: "Grup "+(this.sections.length+1), bars: [{ id: id+1, grid: Array(6).fill().map(() => Array(16).fill('')) }] }); this.rebuildTimeline(); this.renderAll(); },
    addBar(sId) { this.sections.find(s => s.id === sId).bars.push({ id: Date.now(), name: "", grid: Array(6).fill().map(() => Array(16).fill('')) }); this.rebuildTimeline(); this.renderAll(); },
    deleteBar(sId, bId) { const s = this.sections.find(x => x.id === sId); s.bars = s.bars.filter(b => b.id !== bId); this.rebuildTimeline(); this.renderAll(); },
    deleteSec(id) { if(confirm("Hapus grup?")) { this.sections = this.sections.filter(s => s.id !== id); this.rebuildTimeline(); this.renderAll(); } },
    updateSecName(id, v) { this.sections.find(s => s.id === id).name = v; this.save(); },
    updateGrid(bId, r, c, v) { const b = this.getBarById(bId); if(r<5 && v!=="") v = this.solfegeToNum(v); b.grid[r][c] = v; this.renderAll(); this.save(); },
    manualSort(bId) { const b = this.getBarById(bId); if(b) { this.sortNotesInBar(b); this.renderAll(); this.save(); } },
    sortNotesInBar(b) { for(let c=0; c<16; c++) { let notes = []; for(let r=0; r<5; r++) if(b.grid[r][c]) notes.push(parseInt(b.grid[r][c])); let sorted = [...new Set(notes)].sort((a,b) => b-a); for(let r=0; r<5; r++) b.grid[r][c] = sorted[r] ? sorted[r].toString() : ""; } },
    getBarById(id) { for(let s of this.sections) { let b = s.bars.find(x => x.id === id); if(b) return b; } },
    shift(bId, rIdx, dir) { const b = this.getBarById(bId); const move = (a) => dir === 'L' ? a.push(a.shift()) : a.unshift(a.pop()); if(rIdx === 'all') b.grid.forEach(row => move(row)); else move(b.grid[rIdx]); this.renderAll(); this.save(); },
    rebuildTimeline() { this.timeline = []; this.sections.forEach(s => s.bars.forEach(b => this.timeline.push({id: b.id}))); document.getElementById('playback-slider').max = Math.max(0, this.timeline.length * 16 - 1); },
    play() { if(this.isPlaying) { this.isPlaying = false; document.getElementById('play-btn').innerText = '▶ PLAY'; if(this.audio) this.pauseOffset = this.audio.currentTime - this.startTime; } else { if(!this.audio) this.audio = new AudioContext(); this.isPlaying = true; document.getElementById('play-btn').innerText = '⏸ PAUSE'; this.startTime = this.audio.currentTime - this.pauseOffset; this.syncLoop(); } },
    stop() { this.isPlaying = false; this.playLimitStep = -1; document.getElementById('play-btn').innerText = '▶ PLAY'; this.pauseOffset = 0; this.currentBarIdx = -1; this.lastStep = -1; document.getElementById('playback-slider').value = 0; document.getElementById('slider-fill').style.width = '0%'; },
    playSingleBar(bId) { const barIdx = this.timeline.findIndex(item => item.id === bId); if (barIdx === -1) return; const startStep = barIdx * 16; this.playLimitStep = startStep + 16; this.seek(startStep); if (!this.isPlaying) this.play(); },
    seek(step) { const tempo = parseFloat(document.getElementById('tempo').value); this.pauseOffset = step * tempo; if(this.isPlaying && this.audio) this.startTime = this.audio.currentTime - this.pauseOffset; this.lastStep = -1; },
    exportData() { 
        const title = document.getElementById('song-title').value || 'tabklung_mobile';
        const blob = new Blob([JSON.stringify({ songTitle: title, tempo: document.getElementById('tempo').value, sections: this.sections, keyBase: this.keyBase, displayMode: this.displayMode })], {type:'application/json'}); 
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = title.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '_mob.json'; a.click(); 
    },
    importData(e) { const r = new FileReader(); r.onload = (x) => { 
        const data = JSON.parse(x.target.result); this.sections = data.sections; this.keyBase = data.keyBase || 0; this.displayMode = data.displayMode || 'piano'; document.getElementById('key-base').value = this.keyBase; document.getElementById('song-title').value = data.songTitle || ""; document.getElementById('tempo').value = data.tempo || "0.40"; this.rebuildTimeline(); this.renderAll(); 
    }; r.readAsText(e.target.files[0]); },
    save() { localStorage.setItem('tabklung_v11.7_mobile', JSON.stringify({ songTitle: document.getElementById('song-title').value, tempo: document.getElementById('tempo').value, sections: this.sections, keyBase: this.keyBase, displayMode: this.displayMode })); }
};
app.init();
</script>
