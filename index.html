<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABKLUNG Pro - Animative Score Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --note-black: #000000;
            --line-thick: 1.8px;
            --beam-margin: 2px;
            --page-width: 210mm;
            --page-height: 297mm;
            --active-red: #ff0000;
        }

        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        @page { size: A4; margin: 0; }

        body { 
            background: #f8fafc; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            padding: 20px;
            padding-bottom: 120px;
            scroll-behavior: smooth;
        }

        .a4-page {
            background: white;
            width: var(--page-width);
            height: var(--page-height);
            margin: 0 auto 30px auto;
            padding: 12mm 15mm; 
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            page-break-after: always;
        }

        .sheet-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2.5px solid #000; padding-bottom: 5px; margin-bottom: 15px;
            height: 45px; flex-shrink: 0;
        }

        .staff-container {
            display: grid; grid-template-columns: repeat(4, 1fr);
            grid-row-gap: 12px; width: 100%; height: 260mm; align-content: start;
        }

        .bar-box {
            border-left: 1.5px solid var(--note-black); padding: 8px 1px;
            position: relative; height: 50mm; display: flex;
            flex-direction: column; justify-content: center; gap: 4px;
            transition: all 0.3s ease;
        }
        .bar-box:nth-child(4n) { border-right: 1.5px solid var(--note-black); }

        .bar-box.active-bar { 
            background-color: rgba(59, 130, 246, 0.1); 
            box-shadow: inset 0 -4px 0 #3b82f6;
        }

        .bar-num { position: absolute; top: 2px; left: 5px; font-size: 9px; font-weight: 800; color: #cbd5e1; }

        .layer-row { display: flex; justify-content: space-around; height: 18px; align-items: center; }
        .beat-unit { display: flex; position: relative; padding-top: 8px; flex: 1; justify-content: center; }

        .has-beam::before {
            content: ""; position: absolute; top: 4px; left: var(--beam-margin); right: var(--beam-margin);
            height: var(--line-thick); background: var(--note-black); z-index: 10;
        }

        .note {
            position: relative; width: 14px; text-align: center;
            font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 800; line-height: 1;
            color: var(--note-black); transition: transform 0.1s ease;
        }

        .note.active {
            color: var(--active-red) !important;
            transform: scale(1.6);
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.6);
            z-index: 99;
        }

        .dot { position: absolute; left: 50%; transform: translateX(-50%); }
        .dot-u { top: -8px; font-size: 10px; }
        .dot-d { bottom: -9px; font-size: 10px; }
        .slash { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-25deg); font-size: 14px; opacity: 0.6; }
        .empty { width: 4px; }

        .player-controls {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; align-items: center; gap: 15px; 
            background: white; padding: 15px 35px; border-radius: 99px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); border: 2px solid #3b82f6;
        }

        .btn-play { background: #3b82f6; color: white; padding: 10px 25px; border-radius: 99px; font-weight: 800; cursor: pointer; }
        .btn-stop { background: #f1f5f9; color: #475569; padding: 10px 25px; border-radius: 99px; font-weight: 800; cursor: pointer; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

    <div class="no-print flex justify-center py-10">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 text-center max-w-sm w-full">
            <h1 class="text-2xl font-black text-blue-900 mb-1">TABKLUNG PRO</h1>
            <p class="text-xs text-gray-400 mb-6 font-bold tracking-widest">ANIMATIVE SCORE ENGINE</p>
            <input type="file" id="jsonInput" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
        </div>
    </div>

    <div id="print-area"></div>

    <div id="controls" class="no-print player-controls" style="display: none;">
        <div class="flex flex-col mr-6 border-r pr-6 border-gray-200">
            <span id="displayTempo" class="text-[10px] font-black text-blue-600">BPM: 120</span>
            <span id="displayBar" class="text-[10px] font-bold text-gray-400">BAR: 0 / 0</span>
        </div>
        <button onclick="togglePlay()" id="btnPlay" class="btn-play">PLAY</button>
        <button onclick="stopPlayback()" class="btn-stop">STOP</button>
    </div>

    <script>
        const MAP = {
            "48":"1","49":"1/","50":"2","51":"2/","52":"3","53":"4","54":"4/","55":"5","56":"5/","57":"6","58":"6/","59":"7",
            "60":"1","61":"1/","62":"2","63":"2/","64":"3","65":"4","66":"4/","67":"5","68":"5/","69":"6","70":"6/","71":"7",
            "72":"1","73":"1/","74":"2","75":"2/","76":"3","77":"4","78":"4/","79":"5","80":"5/","81":"6","82":"6/","83":"7"
        };
        
        let currentTick = 0;
        let isPlaying = false;
        let playInterval;
        let globalTempo = 120;
        let totalBarsCount = 0;
        let rawData = null;

        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playTone(midiNote, durationMs) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const freq = 440 * Math.pow(2, (midiNote - 69) / 12);
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + (durationMs / 1000));
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + (durationMs / 1000));
        }

        function getNoteDuration(bIdx, lIdx, tIdx) {
            let nextTick = currentTick + 1;
            let duration = 0;
            const msPerTick = (60000 / globalTempo) / 4;

            while (nextTick < totalBarsCount * 16) {
                const b = Math.floor(nextTick / 16);
                const t = nextTick % 16;
                if (rawData.sections[0].bars[b].grid[lIdx][t] !== "") {
                    break;
                }
                duration++;
                nextTick++;
            }
            return (duration + 1) * msPerTick;
        }

        document.getElementById('jsonInput').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    rawData = JSON.parse(ev.target.result);
                    let tempoVal = parseFloat(rawData.tempo);
                    globalTempo = tempoVal < 1 ? 120 : tempoVal;
                    document.getElementById('displayTempo').innerText = `BPM: ${globalTempo}`;
                    render(rawData);
                    document.getElementById('controls').style.display = 'flex';
                } catch (err) { alert("File JSON tidak terbaca!"); }
            };
            reader.readAsText(e.target.files[0]);
        };

        function render(data) {
            const printArea = document.getElementById('print-area');
            printArea.innerHTML = "";
            let allBars = [];
            data.sections.forEach(sec => { sec.bars.forEach(bar => allBars.push(bar)); });
            totalBarsCount = allBars.length;
            const BARS_PER_PAGE = 20; 
            for (let i = 0; i < allBars.length; i += BARS_PER_PAGE) {
                const pageEl = createNewPage(data.songTitle || "STUDI ANGKLUNG", globalTempo, Math.floor(i/BARS_PER_PAGE)+1);
                const staff = pageEl.querySelector('.staff-container');
                const pageBars = allBars.slice(i, i + BARS_PER_PAGE);
                pageBars.forEach((barData, barIdx) => {
                    const gIdx = i + barIdx;
                    const barEl = document.createElement('div');
                    barEl.className = "bar-box";
                    barEl.id = `bar-${gIdx}`;
                    barEl.innerHTML = `<span class="bar-num">${gIdx + 1}</span>`;
                    barData.grid.forEach((layer, lIdx) => {
                        const row = document.createElement('div');
                        row.className = "layer-row";
                        for (let b = 0; b < 16; b += 4) {
                            const ticks = layer.slice(b, b + 4);
                            const beat = document.createElement('div');
                            beat.className = "beat-unit";
                            if (ticks.filter(t => t !== "").length > 1) beat.classList.add('has-beam');
                            beat.innerHTML = ticks.map((t, tIdx) => createNote(t, gIdx, lIdx, b + tIdx)).join("");
                            row.appendChild(beat);
                        }
                        barEl.appendChild(row);
                    });
                    staff.appendChild(barEl);
                });
                printArea.appendChild(pageEl);
            }
        }

        function createNote(v, bIdx, lIdx, tIdx) {
            if (!v || v === "") return `<div class="note empty"></div>`;
            const n = parseInt(v);
            const sym = MAP[v] || "1";
            const slash = sym.includes("/") ? `<span class="slash">/</span>` : "";
            const clean = sym.replace("/", "");
            let dots = "";
            if (n >= 72) dots = `<span class="dot dot-u">.</span>`;
            else if (n <= 59 && n >= 48) dots = `<span class="dot dot-d">.</span>`;
            return `<div class="note" id="nt-${bIdx}-${lIdx}-${tIdx}" data-midi="${v}">${dots}${slash}${clean}</div>`;
        }

        function togglePlay() {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (isPlaying) pausePlayback(); else startPlayback();
        }

        function startPlayback() {
            isPlaying = true;
            document.getElementById('btnPlay').innerText = "PAUSE";
            const msPerTick = (60000 / globalTempo) / 4;

            playInterval = setInterval(() => {
                const bIdx = Math.floor(currentTick / 16);
                const tIdx = currentTick % 16;

                if (tIdx === 0) {
                    document.querySelectorAll('.bar-box.active-bar').forEach(el => el.classList.remove('active-bar'));
                    const curBar = document.getElementById(`bar-${bIdx}`);
                    if (curBar) {
                        curBar.classList.add('active-bar');
                        curBar.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        document.getElementById('displayBar').innerText = `BAR: ${bIdx + 1} / ${totalBarsCount}`;
                    }
                }

                const layerNodes = document.querySelectorAll(`[id^="nt-${bIdx}-"][id$="-${tIdx}"]`);
                layerNodes.forEach((n, lIdx) => {
                    if (n.dataset.midi) {
                        const duration = getNoteDuration(bIdx, lIdx, tIdx);
                        playTone(parseInt(n.dataset.midi), duration);
                        
                        n.classList.add('active');
                        n.style.transitionDuration = (duration / 1000) + 's';
                        
                        setTimeout(() => {
                            n.classList.remove('active');
                            n.style.transitionDuration = '0.1s';
                        }, duration);
                    }
                });

                currentTick++;
                if (currentTick >= totalBarsCount * 16) stopPlayback();
            }, msPerTick);
        }

        function pausePlayback() {
            isPlaying = false;
            clearInterval(playInterval);
            document.getElementById('btnPlay').innerText = "RESUME";
        }

        function stopPlayback() {
            pausePlayback();
            currentTick = 0;
            document.getElementById('btnPlay').innerText = "PLAY";
            document.querySelectorAll('.note.active').forEach(el => {
                el.classList.remove('active');
                el.style.transitionDuration = '0.1s';
            });
            document.querySelectorAll('.bar-box.active-bar').forEach(el => el.classList.remove('active-bar'));
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function createNewPage(title, tempo, pageNum) {
            const page = document.createElement('div');
            page.className = "a4-page";
            page.innerHTML = `
                <div class="sheet-header">
                    <h1 class="text-xl font-black uppercase text-blue-900">${title}</h1>
                    <div class="flex gap-4 text-[11px] font-bold text-gray-400">
                        <span>Do = C</span> <span>4/4</span> <span>T: ${tempo}</span>
                    </div>
                </div>
                <div class="staff-container"></div>
                <div class="mt-auto text-right text-[9px] font-bold text-gray-200">TABKLUNG PRO | Hal. ${pageNum}</div>
            `;
            return page;
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === "Space") { e.preventDefault(); togglePlay(); }
            if (e.code === "Escape") stopPlayback();
        });
    </script>
</body>

</html>
