<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TABKLUNG MOBILE Pro | ABK31</title>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <style>
        :root { 
            --bg: #020617; --panel: #1e293b; --accent: #2dd4bf; --gold: #fbbf24; 
            --danger: #ef4444; --success: #22c55e; --card: #0f172a; --gray: #475569;
            --orange: #f97316;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); color: #f8fafc; 
            margin: 0; display: flex; flex-direction: column; height: 100vh;
            padding-bottom: 85px; /* Ruang untuk Bottom Bar yang lebih besar */
        }

        /* --- HEADER --- */
        .app-header { 
            display: flex; align-items: center; padding: 12px 15px; 
            background: var(--panel); border-bottom: 3px solid var(--gold);
        }
        .app-logo { height: 45px; margin-right: 15px; }
        .song-title-input { 
            background: #000; border: 2px solid var(--gray); color: var(--gold); 
            padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; 
            font-size: 16px; outline: none;
        }

        /* --- TOOLBAR UTAMA (Tombol Besar) --- */
        .top-toolbar { 
            display: flex; overflow-x: auto; padding: 12px; 
            background: #0f172a; gap: 10px; border-bottom: 1px solid #334155; 
            scrollbar-width: none;
        }
        .top-toolbar::-webkit-scrollbar { display: none; }
        
        .btn-main { 
            border: none; color: white; padding: 12px 18px; border-radius: 10px; 
            font-weight: 800; font-size: 14px; white-space: nowrap;
            display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn-main:active { transform: translateY(2px); box-shadow: none; }

        /* --- TIMELINE & SLIDER --- */
        .timeline-container { 
            padding: 15px; display: flex; align-items: center; gap: 15px; 
            background: #0f172a; border-bottom: 1px solid #1e293b;
        }
        .time-display { font-family: monospace; font-size: 18px; color: var(--gold); font-weight: bold; }
        #playback-slider { flex: 1; height: 12px; border-radius: 6px; accent-color: var(--gold); }

        /* --- EDITOR AREA --- */
        .main-editor { flex: 1; overflow-y: auto; padding: 10px; }
        .section-box { background: #111827; border: 2px solid #374151; border-radius: 15px; padding: 12px; margin-bottom: 25px; }
        
        .group-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #334155; 
        }

        .bar-card { 
            background: #0f172a; padding: 12px; border-radius: 12px; 
            margin-top: 15px; border: 2px solid #334155; position: relative;
        }
        .active-playing { border-color: var(--gold) !important; box-shadow: 0 0 15px rgba(251,191,36,0.4); }

        /* GRID SCROLL */
        .grid-scroll-area { overflow-x: auto; padding-bottom: 10px; }
        .grid-row { display: flex; gap: 6px; margin-bottom: 6px; width: max-content; }
        .row-label { width: 30px; font-size: 12px; color: #94a3b8; font-weight: bold; display: flex; align-items: center; }

        /* CELL WITH AUTO-SUGGEST (Native Select) */
        .cell-wrapper {
            position: relative; min-width: 55px; height: 55px;
            background: #000; border: 2px solid #1e293b; border-radius: 8px;
        }
        .grid-select {
            position: absolute; inset: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer; z-index: 2;
        }
        .cell-display {
            position: absolute; inset: 0; display: flex; align-items: center; 
            justify-content: center; font-weight: 800; font-size: 16px; 
            pointer-events: none; color: #fff; font-family: 'Courier New', monospace;
        }

        /* VISUAL FEEDBACK */
        .playing-glow {
            background: var(--gold) !important;
            border-color: #fff !important;
            box-shadow: 0 0 20px var(--gold);
            z-index: 5;
        }
        .playing-glow .cell-display { color: #000; }

        /* --- BOTTOM NAVIGATION --- */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; background: #1e293b; 
            border-top: 3px solid var(--gold); display: flex; gap: 12px;
            padding: 12px 20px; z-index: 1000; height: 85px;
        }
        .btn-play-large { 
            flex: 2; background: var(--success); border: none; color: white; 
            border-radius: 12px; font-size: 20px; font-weight: 900; 
            box-shadow: 0 4px 0 #15803d;
        }
        .btn-stop-large { 
            flex: 1; background: var(--danger); border: none; color: white; 
            border-radius: 12px; font-size: 20px; font-weight: 900;
            box-shadow: 0 4px 0 #b91c1c;
        }
        .btn-play-large:active, .btn-stop-large:active { transform: translateY(3px); box-shadow: none; }

        .beat-divider { border-right: 2px dashed #475569 !important; padding-right: 4px; }
    </style>
</head>
<body>

<div class="app-header">
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjvm4FDE7tagy8ZtWyfy_pzRnB9D8orAO_5EwH5sBbJOC3JIOlGweg5XCwhWQZbY8xVIFTbMpojvtX3X-BZv_xfrvjzIkXn3-RYIwFJMhOnM-y0YaO8JZocqYoFmq4NSdHwsPzAp8kIjzfFtCL8KrgDiueLZRhApll7tvcTmeRS6lcBtjEK4ZthgkS7rmI/s320/kang_putra__1_-removebg-preview.png" class="app-logo">
    <div style="flex:1">
        <input type="text" id="song-title" class="song-title-input" placeholder=" JUDUL LAGU..." oninput="app.save()">
    </div>
</div>

<div class="top-toolbar">
    <button class="btn-main" style="background:#3b82f6;" onclick="app.exportData()">💾 SIMPAN</button>
    <button class="btn-main" style="background:#6366f1;" onclick="document.getElementById('importFile').click()">📂 BUKA</button>
    <button class="btn-main" style="background:#8b5cf6;" onclick="document.getElementById('midiFile').click()">🎹 MIDI</button>
    <button class="btn-main" style="background:var(--orange);" onclick="app.quantizeAll()">🎯 AUTO QNTZ</button>
    
    <div style="background: #000; padding: 5px 12px; border-radius: 10px; display: flex; align-items: center; gap: 8px; border: 1px solid var(--gray);">
        <span style="color:var(--gold); font-weight:bold; font-size:12px;">BPM</span>
        <input type="number" id="tempo" value="0.40" step="0.01" style="width:60px; background:transparent; color:white; border:none; font-size:16px; font-weight:bold; text-align:center;" oninput="app.save()">
    </div>

    <select id="key-base" class="song-title-input" style="width:auto; font-size:14px;" onchange="app.setKeyBase(this.value)">
        <option value="0">Do=C</option><option value="2">Do=D</option><option value="4">Do=E</option><option value="5">Do=F</option><option value="7">Do=G</option><option value="9">Do=A</option><option value="11">Do=B</option>
    </select>

    <input type="file" id="importFile" style="display:none" onchange="app.importData(event)">
    <input type="file" id="midiFile" style="display:none" onchange="app.importMIDI(event)">
</div>

<div class="timeline-container">
    <span class="time-display" id="time-current">00:00</span>
    <input type="range" id="playback-slider" value="0" min="0" step="1" oninput="app.seek(this.value)">
</div>

<div class="main-editor" id="sections-container"></div>

<div style="padding: 0 15px 30px 15px;">
    <button onclick="app.addSection()" style="width:100%; padding:20px; background:var(--gold); border:none; font-weight:900; font-size:16px; border-radius:15px; color:black;">+ TAMBAH GRUP MUSIK BARU</button>
</div>

<div class="bottom-bar">
    <button onclick="app.stop()" class="btn-stop-large">■ STOP</button>
    <button id="play-btn" onclick="app.play()" class="btn-play-large">▶ MULAI</button>
</div>

<script>
const app = {
    sections: [], timeline: [], isPlaying: false, audio: null,
    startTime: 0, pauseOffset: 0, currentBarIdx: -1, lastStep: -1,
    displayMode: 'solfege', keyBase: 0,
    
    // Range Nada Angklung Standard (MIDI 55-85)
    noteList: ["", "55","56","57","58","59","60","61","62","63","64","65","66","67","68","69","70","71","72","73","74","75","76","77","78","79","80","81","82","83","84","85"],
    solfegeMap: { 0: "1", 1: "1#", 2: "2", 3: "2#", 4: "3", 5: "4", 6: "4#", 7: "5", 8: "5#", 9: "6", 10: "6#", 11: "7" },
    chordList: ["", "C", "Cm", "D", "Dm", "E", "Em", "F", "Fm", "G", "Gm", "A", "Am", "B", "Bm"],

    init() {
        const saved = JSON.parse(localStorage.getItem('tabklung_mobile_abk31'));
        if(saved) {
            this.sections = saved.sections;
            this.keyBase = saved.keyBase || 0;
            document.getElementById('key-base').value = this.keyBase;
            document.getElementById('song-title').value = saved.songTitle || "";
            document.getElementById('tempo').value = saved.tempo || "0.40";
        } else { this.addSection(); }
        this.rebuildTimeline(); this.renderAll();
    },

    numToSmartDisplay(n) {
        if(!n || isNaN(n)) return "";
        let val = parseInt(n);
        let relativeNote = val - (60 + this.keyBase);
        let octave = Math.floor(relativeNote / 12);
        let noteInOctave = ((relativeNote % 12) + 12) % 12;
        let baseNum = this.solfegeMap[noteInOctave];
        if (octave > 0) return baseNum + ".".repeat(octave);
        if (octave < 0) return baseNum + "\u0323".repeat(Math.abs(octave));
        return baseNum;
    },

    playTone(f) { 
        if(!this.audio) this.audio = new AudioContext();
        const o = this.audio.createOscillator(), g = this.audio.createGain(); 
        o.type='triangle'; o.frequency.value=f; 
        g.gain.setValueAtTime(0, this.audio.currentTime); 
        g.gain.linearRampToValueAtTime(0.2, this.audio.currentTime+0.01); 
        g.gain.exponentialRampToValueAtTime(0.0001, this.audio.currentTime+0.6); 
        o.connect(g); g.connect(this.audio.destination); 
        o.start(); o.stop(this.audio.currentTime+0.6); 
    },

    renderAll() {
        const container = document.getElementById('sections-container');
        container.innerHTML = this.sections.map(s => `
            <div class="section-box">
                <div class="group-header">
                    <input value="${s.name}" oninput="app.updateSecName(${s.id}, this.value)" style="background:transparent; border:none; color:var(--gold); font-weight:900; font-size:18px; width:60%;">
                    <button class="btn-main" style="background:var(--danger); padding:8px 12px;" onclick="app.deleteSec(${s.id})">HAPUS</button>
                </div>
                <div>
                    ${s.bars.map((b, bIdx) => `
                        <div class="bar-card" id="bar-card-${b.id}">
                            <div style="display:flex; gap:8px; margin-bottom:12px; overflow-x:auto; padding-bottom:5px;">
                                <input class="song-title-input" style="width:80px; font-size:12px; padding:5px;" value="${b.name || 'BAR '+(bIdx+1)}" oninput="app.updateBarName(${b.id}, this.value)">
                                <button class="btn-main" style="background:#334; padding:5px 15px;" onclick="app.shift(${b.id}, 'L')">◀</button>
                                <button class="btn-main" style="background:#334; padding:5px 15px;" onclick="app.shift(${b.id}, 'R')">▶</button>
                                <button class="btn-main" style="background:var(--success); color:black; padding:5px 15px;" onclick="app.playSingleBar(${b.id})">PLAY BAR</button>
                                <button class="btn-main" style="background:var(--danger); padding:5px 10px;" onclick="app.deleteBar(${s.id}, ${b.id})">✖</button>
                            </div>
                            
                            <div class="grid-scroll-area">
                                ${b.grid.map((row, rIdx) => `
                                    <div class="grid-row">
                                        <span class="row-label">${rIdx==5?'CH':(rIdx+1)}</span>
                                        ${row.map((cell, cIdx) => `
                                            <div class="cell-wrapper ${cIdx % 4 === 3 ? 'beat-divider' : ''}" data-loc="${s.id}-${b.id}-${rIdx}-${cIdx}">
                                                <div class="cell-display">${rIdx==5 ? cell : this.numToSmartDisplay(cell)}</div>
                                                <select class="grid-select" onchange="app.updateGrid(${b.id}, ${rIdx}, ${cIdx}, this.value)">
                                                    ${ (rIdx === 5 ? this.chordList : this.noteList).map(opt => `
                                                        <option value="${opt}" ${cell == opt ? 'selected' : ''}>
                                                            ${rIdx==5 ? (opt||'Kosong') : (opt ? this.numToSmartDisplay(opt) : 'Kosong')}
                                                        </option>
                                                    `).join('') }
                                                </select>
                                            </div>
                                        `).join('')}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                    <button onclick="app.addBar(${s.id})" style="width:100%; margin-top:15px; padding:12px; background:rgba(45,212,191,0.1); border:2px dashed var(--accent); color:var(--accent); font-weight:bold; border-radius:10px;">+ TAMBAH BAR</button>
                </div>
            </div>
        `).join('');
    },

    syncLoop() {
        if(!this.isPlaying) return;
        const tempo = parseFloat(document.getElementById('tempo').value);
        const elapsed = this.audio.currentTime - this.startTime;
        const step = Math.floor(elapsed / tempo);
        
        if (this.playLimitStep !== -1 && step >= this.playLimitStep) { this.stop(); return; }
        const barIdx = Math.floor(step / 16);
        const subStep = step % 16;
        
        if(barIdx >= this.timeline.length) { this.stop(); return; }
        
        document.getElementById('playback-slider').value = step;
        
        if(barIdx !== this.currentBarIdx) { 
            this.currentBarIdx = barIdx; 
            document.querySelectorAll('.bar-card').forEach(c => c.classList.remove('active-playing'));
            let activeCard = document.getElementById(`bar-card-${this.timeline[barIdx].id}`);
            if(activeCard) activeCard.classList.add('active-playing');
        }

        if(step !== this.lastStep) {
            this.lastStep = step;
            const bar = this.getBarById(this.timeline[barIdx].id);
            const sId = this.timeline[barIdx].sId;

            document.querySelectorAll('.playing-glow').forEach(el => el.classList.remove('playing-glow'));

            for(let r=0; r<6; r++) {
                let cellLoc = `${sId}-${bar.id}-${r}-${subStep}`;
                let cellEl = document.querySelector(`[data-loc="${cellLoc}"]`);
                if(cellEl) cellEl.classList.add('playing-glow');

                if(r < 5 && bar.grid[r][subStep]) {
                    const midiNote = parseInt(bar.grid[r][subStep]);
                    const freq = 261.63 * Math.pow(2, (midiNote - 60) / 12);
                    this.playTone(freq);
                }
            }
        }
        requestAnimationFrame(() => this.syncLoop());
    },

    // --- LOGIC FUNCTIONS ---
    updateGrid(bId, r, c, v) { this.getBarById(bId).grid[r][c] = v; this.renderAll(); this.save(); },
    updateSecName(id, v) { this.sections.find(s => s.id === id).name = v; this.save(); },
    updateBarName(id, v) { this.getBarById(id).name = v; this.save(); },
    addSection() { const id = Date.now(); this.sections.push({ id, name: "GRUP BARU", bars: [{ id: id+1, grid: Array(6).fill().map(() => Array(16).fill('')) }] }); this.rebuildTimeline(); this.renderAll(); },
    addBar(sId) { this.sections.find(s => s.id === sId).bars.push({ id: Date.now(), grid: Array(6).fill().map(() => Array(16).fill('')) }); this.rebuildTimeline(); this.renderAll(); },
    deleteBar(sId, bId) { this.sections.find(s => s.id === sId).bars = this.sections.find(s => s.id === sId).bars.filter(b => b.id !== bId); this.rebuildTimeline(); this.renderAll(); },
    deleteSec(id) { if(confirm("Hapus grup ini?")) { this.sections = this.sections.filter(s => s.id !== id); this.rebuildTimeline(); this.renderAll(); } },
    getBarById(id) { for(let s of this.sections) { let b = s.bars.find(x => x.id === id); if(b) return b; } },
    shift(bId, dir) { const b = this.getBarById(bId); b.grid.forEach(row => dir === 'L' ? row.push(row.shift()) : row.unshift(row.pop())); this.renderAll(); this.save(); },
    setKeyBase(v) { this.keyBase = parseInt(v); this.renderAll(); this.save(); },
    rebuildTimeline() { 
        this.timeline = []; this.sections.forEach(s => s.bars.forEach(b => this.timeline.push({sId: s.id, id: b.id}))); 
        document.getElementById('playback-slider').max = Math.max(0, this.timeline.length * 16 - 1); 
    },
    seek(step) { this.pauseOffset = step * parseFloat(document.getElementById('tempo').value); if(this.isPlaying) this.startTime = this.audio.currentTime - this.pauseOffset; },
    play() { 
        if(this.isPlaying) { this.isPlaying = false; document.getElementById('play-btn').innerText = '▶ MULAI'; this.pauseOffset = this.audio.currentTime - this.startTime; } 
        else { if(!this.audio) this.audio = new AudioContext(); this.isPlaying = true; document.getElementById('play-btn').innerText = '⏸ PAUSE'; this.startTime = this.audio.currentTime - this.pauseOffset; this.syncLoop(); } 
    },
    stop() { this.isPlaying = false; this.playLimitStep = -1; document.getElementById('play-btn').innerText = '▶ MULAI'; this.pauseOffset = 0; this.lastStep = -1; document.getElementById('playback-slider').value = 0; document.querySelectorAll('.playing-glow').forEach(el => el.classList.remove('playing-glow')); },
    playSingleBar(bId) { const idx = this.timeline.findIndex(t => t.id === bId); if(idx !== -1) { this.playLimitStep = (idx+1)*16; this.seek(idx*16); if(!this.isPlaying) this.play(); } },
    save() { localStorage.setItem('tabklung_mobile_abk31', JSON.stringify({ songTitle: document.getElementById('song-title').value, tempo: document.getElementById('tempo').value, sections: this.sections, keyBase: this.keyBase })); },
    exportData() { 
        const blob = new Blob([JSON.stringify({ songTitle: document.getElementById('song-title').value, sections: this.sections, keyBase: this.keyBase, tempo: document.getElementById('tempo').value })], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'tabklung_mobile.json'; a.click();
    },
    importData(e) { 
        const r = new FileReader(); r.onload = (x) => { 
            const d = JSON.parse(x.target.result); this.sections = d.sections; this.keyBase = d.keyBase || 0; 
            document.getElementById('song-title').value = d.songTitle || ""; this.rebuildTimeline(); this.renderAll(); 
        }; r.readAsText(e.target.files[0]); 
    }
};

app.init();
</script>
</body>
</html>
