<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABK31 | by: Kang Putra Angklung</title>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <style>
        :root { 
            --bg: #020617; --panel: #1e293b; --accent: #2dd4bf; --gold: #fbbf24; 
            --danger: #ff4757; --success: #22c55e; --card: #0f172a; --gray: #475569;
            --orange: #e67e22; --deep-orange: #d35400;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; display: flex; overflow: hidden; height: 100vh; }
        .left-panel { width: 35%; background: #0f172a; border-right: 2px solid #334155; display: flex; flex-direction: column; }
        .right-panel { width: 65%; padding: 20px; overflow-y: auto; background: var(--bg); }
        .app-header { display: flex; align-items: center; padding: 10px 15px; background: #1e293b; border-bottom: 2px solid var(--gold); }
        .app-logo { height: 45px; margin-right: 12px; filter: drop-shadow(0 0 5px rgba(251, 191, 36, 0.3)); }
        
        .song-title-input { background: #000; border: 1px solid var(--gray); color: var(--gold); padding: 5px 10px; border-radius: 4px; font-weight: bold; width: 100%; outline: none; margin-top: 4px; }
        .song-title-input:focus { border-color: var(--accent); }

        .top-toolbar { padding: 10px; background: #0f172a; display: flex; flex-wrap: wrap; gap: 5px; border-bottom: 1px solid #334155; align-items: center; }
        .btn-tool { border: none; color: white; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 10px; transition: 0.2s; text-transform: uppercase; }
        .btn-tool:hover { transform: translateY(-1px); filter: brightness(1.2); }
        
        .mode-selector { background: #334155; padding: 3px; border-radius: 6px; display: flex; gap: 3px; }
        .btn-mode { border: none; background: transparent; color: #94a3b8; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: bold; }
        .btn-mode.active { background: var(--gold); color: black; }
        .key-select { background: #000; color: var(--gold); border: 1px solid var(--gold); border-radius: 4px; font-size: 10px; padding: 3px; cursor: pointer; }

        .monitor-frame { flex: 1; background: #000; margin: 15px; border-radius: 12px; border: 4px solid #334155; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .lane { flex: 1; display: grid; grid-template-columns: repeat(16, 1fr); border-bottom: 1px solid #111; }
        .monitor-note { margin: 3px; border-radius: 3px; height: 75%; }
        .scan-cursor { position: absolute; top: 0; bottom: 0; width: calc(100% / 16); background: rgba(45, 212, 191, 0.15); border-left: 2px solid var(--accent); z-index: 10; pointer-events: none; }
        
        .timeline-container { padding: 0 20px 15px 20px; display: flex; align-items: center; gap: 15px; }
        .time-display { font-family: 'Courier New', monospace; font-size: 14px; color: var(--gold); min-width: 45px; }
        .slider-wrapper { flex: 1; position: relative; height: 6px; background: var(--gray); border-radius: 3px; }
        #playback-slider { -webkit-appearance: none; width: 100%; height: 100%; background: transparent; cursor: pointer; position: absolute; z-index: 5; margin: 0; top:0; }
        #playback-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #fff; border: 2px solid var(--gold); border-radius: 50%; }
        .slider-progress { position: absolute; height: 100%; background: var(--gold); border-radius: 3px; pointer-events: none; width: 0%; top:0; }

        .section-box { background: #111827; border: 1px solid #374151; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .section-box.collapsed .bar-content { display: none; }
        .group-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #1f2937; }
        .grid-row { display: flex; gap: 4px; margin-bottom: 4px; align-items: center; min-width: max-content; }
        .btn-shift { background: #334155; color: white; border: none; border-radius: 3px; cursor: pointer; width: 22px; height: 22px; font-size: 10px; flex-shrink: 0; }
        
        .grid-cell { width: 100%; min-width: 30px; height: 28px; border: 1px solid #1e293b; text-align: center; font-weight: bold; border-radius: 4px; font-size: 12px; outline: none; background: #000; color: #fff; cursor: cell; font-family: 'Courier New', monospace; }
        .grid-cell.selected { background-color: rgba(251, 191, 36, 0.4) !important; border: 1px solid var(--gold) !important; }
        
        .beat-1 { background: #0f172a; } 
        .beat-2 { background: #1e293b; } 
        
        .bar-card { background: #0f172a; padding: 10px; border-radius: 8px; margin-top: 10px; border: 2px solid #334155; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .active-playing { border-color: var(--gold) !important; background: #1e294b !important; }
        input[type="number"] { width: 50px; background: #000; color: var(--gold); border: 1px solid var(--gold); border-radius: 4px; text-align: center; font-size: 11px; }

        #autocomplete-box {
            position: fixed; background: #1e293b; border: 1px solid var(--gold);
            border-radius: 4px; z-index: 1000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-height: 200px; overflow-y: auto; min-width: 60px;
        }
        .suggest-item {
            padding: 8px 12px; cursor: pointer; font-size: 14px; color: white;
            border-bottom: 1px solid #334155; text-align: center;
        }
        .suggest-item:hover, .suggest-item.active { background: var(--gold); color: black; }

        .layer-selector { font-size: 9px; color: var(--accent); background: #000; border: 1px solid #334155; border-radius: 4px; padding: 2px; }

        /* Optimasi Mobile-Responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .left-panel { width: 100%; height: 45vh; border-right: none; border-bottom: 2px solid var(--gold); }
            .right-panel { width: 100%; height: 55vh; padding: 10px; }
            .app-logo { height: 35px; }
            
            /* Horizontal Scroll untuk Toolbar Top agar tidak bertumpuk berantakan */
            .top-toolbar { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 12px; }
            .top-toolbar::-webkit-scrollbar { display: none; }
            
            .monitor-frame { margin: 10px; }
            .timeline-container { padding: 0 15px 10px 15px; }
            
            /* Input Ukuran Jari (Jempol) yang Nyaman */
            .grid-cell { min-width: 45px; height: 45px; font-size: 14px; }
            .btn-shift { width: 35px; height: 35px; font-size: 14px; }
            
            .group-header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .section-box { padding: 10px; }
        }
    </style>
</head>
<body>

<div id="autocomplete-box"></div>

<div class="left-panel">
    <div class="app-header">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjvm4FDE7tagy8ZtWyfy_pzRnB9D8orAO_5EwH5sBbJOC3JIOlGweg5XCwhWQZbY8xVIFTbMpojvtX3X-BZv_xfrvjzIkXn3-RYIwFJMhOnM-y0YaO8JZocqYoFmq4NSdHwsPzAp8kIjzfFtCL8KrgDiueLZRhApll7tvcTmeRS6lcBtjEK4ZthgkS7rmI/s320/kang_putra__1_-removebg-preview.png" class="app-logo">
        <div style="flex:1">
            <h3 style="margin:0; color:var(--gold); font-size:14px;">ABK31 | by: Kang Putra Angklung</h3>
            <input type="text" id="song-title" class="song-title-input" placeholder="Judul Lagu..." oninput="app.save()">
        </div>
    </div>

    <div class="top-toolbar">
        <button class="btn-tool" style="background:#3b82f6;" onclick="app.exportData()">💾 Save</button>
        <button class="btn-tool" style="background:#6366f1;" onclick="document.getElementById('importFile').click()">📂 Load</button>
        <button class="btn-tool" style="background:#8b5cf6;" onclick="document.getElementById('midiFile').click()">🎹 MIDI</button>
        
        <div style="border-left: 1px solid #334; padding-left: 5px; display: flex; align-items: center; gap: 4px;">
            <select id="mass-layer-target" class="layer-selector">
                <option value="all">Semua Layer</option>
                <option value="exclude-l1">Kecuali Layer 1</option>
                <option value="l1-only">Hanya Layer 1</option>
            </select>
            <button class="btn-tool" style="background:var(--deep-orange);" onclick="app.quantizeAll(document.getElementById('mass-layer-target').value)">🎯 Selective Mass</button>
        </div>

        <div class="mode-selector">
            <button id="mode-piano" class="btn-mode active" onclick="app.setDisplayMode('piano')">Piano</button>
            <button id="mode-solfege" class="btn-mode" onclick="app.setDisplayMode('solfege')">123</button>
        </div>

        <select id="key-base" class="key-select" onchange="app.setKeyBase(this.value)">
            <option value="0">Do=C</option><option value="1">Do=C#</option><option value="2">Do=D</option>
            <option value="3">Do=D#</option><option value="4">Do=E</option><option value="5">Do=F</option>
            <option value="6">Do=F#</option><option value="7">Do=G</option><option value="8">Do=G#</option>
            <option value="9">Do=A</option><option value="10">Do=A#</option><option value="11">Do=B</option>
        </select>

        <div style="display:flex; align-items:center; gap:3px; margin-left: 5px;">
            <span style="font-size:9px; color:#94a3b8">BPM</span>
            <input type="number" id="tempo" value="0.40" step="0.01" oninput="app.save()">
        </div>

        <input type="file" id="importFile" style="display:none" onchange="app.importData(event)">
        <input type="file" id="midiFile" style="display:none" onchange="app.importMIDI(event)">
    </div>

    <div class="monitor-frame">
        <div class="scan-cursor" id="scan-cursor"></div>
        <div class="lane" data-row="0"></div><div class="lane" data-row="1"></div>
        <div class="lane" data-row="2"></div><div class="lane" data-row="3"></div>
        <div class="lane" data-row="4"></div><div class="lane" data-row="5" style="background:#0a0a0a"></div>
    </div>

    <div class="timeline-container">
        <span class="time-display" id="time-current">00:00</span>
        <div class="slider-wrapper">
            <div class="slider-progress" id="slider-fill"></div>
            <input type="range" id="playback-slider" value="0" min="0" step="1" oninput="app.seek(this.value)">
        </div>
    </div>

    <div style="padding:15px; display:flex; gap:10px; background:#1e293b;">
        <button id="play-btn" onclick="app.play()" style="flex:2; padding:12px; background:var(--success); border:none; color:white; font-weight:bold; border-radius:8px; cursor:pointer;">▶ PLAY</button>
        <button onclick="app.stop()" style="flex:1; padding:12px; background:var(--danger); border:none; color:white; font-weight:bold; border-radius:8px; cursor:pointer;">■ STOP</button>
    </div>
</div>

<div class="right-panel">
    <div id="sections-container"></div>
    <button onclick="app.addSection()" style="width:100%; padding:18px; background:var(--gold); border:none; font-weight:bold; border-radius:12px; cursor:pointer; color:black; margin-top:20px;">+ TAMBAH GRUP MUSIK BARU</button>
</div>

<script>
const app = {
    sections: [], timeline: [], isPlaying: false, audio: null,
    startTime: 0, pauseOffset: 0, currentBarIdx: -1, lastStep: -1,
    selection: { start: null, end: null, active: false }, clipboard: null,
    displayMode: 'piano', keyBase: 0, playLimitStep: -1,
    // MIDI List Standard C4=60
    noteList: ["C4","C#4","D4","D#4","E4","F4","F#4","G4","G#4","A4","A#4","B4","C5","C#5","D5","D#5","E5","F5","F#5","G5","G#5","A5","A#5","B5","C6","C#6","D6","D#6","E6","F6","F#6","G6","G#6","A6","A#6","B6","C7","C#7","D7","D#7","E7"],
    solfegeMap: { 0: "1", 1: "1\u0338", 2: "2", 3: "2\u0338", 4: "3", 5: "4", 6: "4\u0338", 7: "5", 8: "5\u0338", 9: "6", 10: "6\u0338", 11: "7" },
    noteColors: { 'C': '#FF0000', 'C#': '#FF8C00', 'D': '#FFD700', 'D#': '#ADFF2F', 'E': '#00FF00', 'F': '#00FA9A', 'F#': '#00FFFF', 'G': '#1E90FF', 'G#': '#0000FF', 'A': '#8A2BE2', 'A#': '#9400D3', 'B': '#FF1493' },

    init() {
        const saved = JSON.parse(localStorage.getItem('tabklung_v11.7_fix'));
        if(saved) {
            this.sections = saved.sections;
            this.keyBase = saved.keyBase || 0;
            this.displayMode = saved.displayMode || 'piano';
            document.getElementById('key-base').value = this.keyBase;
            document.getElementById('song-title').value = saved.songTitle || "";
            document.getElementById('tempo').value = saved.tempo || "0.40";
            this.updateModeUI();
        } else { this.addSection(); }
        this.rebuildTimeline(); this.renderAll(); this.initEvents();
    },

    numToSmartDisplay(n) {
        if(!n || isNaN(n)) return n;
        if(this.displayMode === 'piano') return this.numToSolfege(n);
        
        let val = parseInt(n);
        let relativeNote = val - (60 + this.keyBase);
        let octave = Math.floor(relativeNote / 12);
        let noteInOctave = ((relativeNote % 12) + 12) % 12;
        
        let baseNum = this.solfegeMap[noteInOctave];
        if (octave > 0) return baseNum + ".".repeat(octave);
        if (octave < 0) return baseNum + "\u0323".repeat(Math.abs(octave));
        return baseNum;
    },

    playTone(f) { 
        if(!this.audio) this.audio = new AudioContext();
        const o = this.audio.createOscillator(), g = this.audio.createGain(); 
        o.type='triangle'; 
        o.frequency.value=f; 
        g.gain.setValueAtTime(0, this.audio.currentTime); 
        g.gain.linearRampToValueAtTime(0.2, this.audio.currentTime+0.01); 
        g.gain.exponentialRampToValueAtTime(0.0001, this.audio.currentTime+0.6); 
        o.connect(g); g.connect(this.audio.destination); 
        o.start(); o.stop(this.audio.currentTime+0.6); 
    },

    syncLoop() {
        if(!this.isPlaying) return;
        const tempo = parseFloat(document.getElementById('tempo').value);
        const elapsed = this.audio.currentTime - this.startTime;
        const step = Math.floor(elapsed / tempo);
        if (this.playLimitStep !== -1 && step >= this.playLimitStep) { this.stop(); return; }
        const barIdx = Math.floor(step / 16);
        const subStep = step % 16;
        if(barIdx >= this.timeline.length) { this.stop(); return; }
        
        document.getElementById('playback-slider').value = step;
        document.getElementById('slider-fill').style.width = (step / (document.getElementById('playback-slider').max || 1) * 100) + '%';
        document.getElementById('scan-cursor').style.left = (subStep / 16 * 100) + '%';
        
        if(barIdx !== this.currentBarIdx) { this.currentBarIdx = barIdx; this.refreshMonitor(barIdx); }
        if(step !== this.lastStep) {
            this.lastStep = step;
            const bar = this.getBarById(this.timeline[barIdx].id);
            for(let r=0; r<5; r++) {
                if(bar.grid[r][subStep]) {
                    const midiNote = parseInt(bar.grid[r][subStep]);
                    const freq = 261.63 * Math.pow(2, (midiNote - 60) / 12);
                    this.playTone(freq);
                }
            }
        }
        requestAnimationFrame(() => this.syncLoop());
    },

    async importMIDI(e) {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = async (x) => {
            const midi = new Midi(x.target.result);
            const sps = (60/(midi.header.tempos[0]?.bpm || 120))/4;
            document.getElementById('tempo').value = sps.toFixed(3);
            let notes = [];
            midi.tracks.forEach(t => t.notes.forEach(n => notes.push({midi: n.midi, step: Math.round(n.time / sps)})));
            
            this.sections = [{ id: Date.now(), name: "MIDI IMPORT", bars: [], collapsed: false }];
            
            notes.sort((a,b) => a.step - b.step).forEach(n => {
                let m = n.midi; 
                while (m < 55) m += 12; 
                while (m > 85) m -= 12; 
                
                if (m >= 55 && m <= 85) {
                    let bIdx = Math.floor(n.step / 16), sStep = n.step % 16;
                    while(this.sections[0].bars.length <= bIdx) {
                        this.sections[0].bars.push({ 
                            id: Date.now()+this.sections[0].bars.length, 
                            name: "", 
                            grid: Array(6).fill().map(() => Array(16).fill('')) 
                        });
                    }
                    let bar = this.sections[0].bars[bIdx];
                    for(let r=0; r<5; r++) if(bar.grid[r][sStep] === "") { bar.grid[r][sStep] = m.toString(); break; }
                }
            });
            
            this.sections[0].bars.forEach(b => this.sortNotesInBar(b));
            this.rebuildTimeline(); this.renderAll(); this.save();
            alert("MIDI Berhasil Diimpor dengan Octave Folding (Range 55-85)!");
        };
        reader.readAsArrayBuffer(file);
    },

    quantizeToAngklung(bId, mode = 'all') {
        const bar = this.getBarById(bId);
        if (!bar) return;
        const anchorPoints = [0, 4, 8, 12];
        let rowsToProcess = [];
        switch(mode) {
            case 'exclude-l1': rowsToProcess = [1, 2, 3, 4]; break;
            case 'l1-only': rowsToProcess = [0]; break;
            default: rowsToProcess = [0, 1, 2, 3, 4];
        }
        anchorPoints.forEach(point => {
            let uniqueNotes = new Set();
            for (let c = point; c < point + 4; c++) {
                rowsToProcess.forEach(r => {
                    if (bar.grid[r][c]) { uniqueNotes.add(bar.grid[r][c]); bar.grid[r][c] = ""; }
                });
            }
            let sortedNotes = Array.from(uniqueNotes).sort((a, b) => b - a);
            sortedNotes.forEach((note, idx) => {
                if (idx < rowsToProcess.length) { bar.grid[rowsToProcess[idx]][point] = note; }
            });
        });
        this.renderAll(); this.save();
    },

    quantizeAll(mode = 'all') {
        let label = mode === 'exclude-l1' ? "KECUALI Layer 1" : (mode === 'l1-only' ? "HANYA Layer 1" : "SEMUA Layer");
        if (!confirm(`Terapkan gaya Angklung ke ${label} pada seluruh bar?`)) return;
        this.sections.forEach(section => section.bars.forEach(bar => this.quantizeToAngklung(bar.id, mode)));
        this.renderAll(); this.save(); alert("Proses Quantize Berhasil!");
    },

    doubleOctave(bId) {
        const bar = this.getBarById(bId);
        if (!bar) return;
        for (let c = 0; c < 16; c++) {
            let colNotes = [];
            for (let r = 0; r < 5; r++) if (bar.grid[r][c]) colNotes.push(parseInt(bar.grid[r][c]));
            colNotes.forEach(n => {
                let low = n - 12;
                if (low >= 36 && !colNotes.includes(low)) {
                    for (let r = 0; r < 5; r++) if (bar.grid[r][c] === "") { bar.grid[r][c] = low.toString(); colNotes.push(low); break; }
                }
            });
        }
        this.sortNotesInBar(bar); this.renderAll(); this.save();
    },

    autoChord(bId) {
        const bar = this.getBarById(bId);
        if (!bar) return;
        const notesMap = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        let lastDetected = "";
        for (let col = 0; col < 16; col++) {
            let notesInCol = [];
            for (let r = 0; r < 5; r++) {
                if (bar.grid[r][col]) {
                    let noteNum = parseInt(bar.grid[r][col]);
                    let noteName = notesMap[(noteNum) % 12];
                    if (!notesInCol.includes(noteName)) notesInCol.push(noteName);
                }
            }
            if (notesInCol.length > 0) {
                let detected = this.guessChord(notesInCol);
                if (detected !== lastDetected) { bar.grid[5][col] = detected; lastDetected = detected; } 
                else { bar.grid[5][col] = ""; }
            } else { bar.grid[5][col] = ""; lastDetected = ""; }
        }
        this.renderAll(); this.save();
    },

    guessChord(notes) {
        const chords = { "C":["C","E","G"], "Cm":["C","D#","G"], "D":["D","F#","A"], "Dm":["D","F","A"], "E":["E","G#","B"], "Em":["E","G","B"], "F":["F","A","C"], "Fm":["F","G#","C"], "G":["G","B","D"], "Gm":["G","A#","D"], "A":["A","C#","E"], "Am":["A","C","E"], "B":["B","D#","F#"], "Bm":["B","D","F#"] };
        for (let name in chords) { if (chords[name].every(n => notes.includes(n))) return name; }
        return notes[0];
    },

    renderAll() {
        const container = document.getElementById('sections-container');
        container.innerHTML = this.sections.map(s => `
            <div class="section-box ${s.collapsed ? 'collapsed' : ''}">
                <div class="group-header">
                    <input value="${s.name}" oninput="app.updateSecName(${s.id}, this.value)" style="background:transparent; border:none; color:white; font-weight:bold; font-size:16px; outline:none; width: 150px;">
                    <div style="display:flex; gap:5px; flex-wrap:wrap;">
                        ${s.collapsed ? `<button class="btn-tool" style="background:var(--success); color:black;" onclick="app.toggleFold(${s.id}, false)">📂 OPEN</button>` : `<button class="btn-tool" style="background:var(--gray);" onclick="app.toggleFold(${s.id}, true)">📁 FOLD</button>`}
                        <button class="btn-tool" style="background:var(--accent); color:black;" onclick="app.addBar(${s.id})">+ BAR</button>
                        <button class="btn-tool" style="background:var(--danger);" onclick="app.deleteSec(${s.id})">DEL</button>
                    </div>
                </div>
                <div class="bar-content">
                    ${s.bars.map((b, bIdx) => `
                        <div class="bar-card" id="bar-card-${b.id}">
                            <div style="display:flex; gap:8px; margin-bottom:8px; align-items:center;">
                                <input value="${b.name || 'BAR ' + (bIdx + 1)}" oninput="app.updateBarName(${b.id}, this.value)" style="background:none; border:none; color:var(--gold); font-size:10px; font-weight:bold; width:60px;">
                                <button class="btn-tool" style="background:#334; padding:4px 8px;" onclick="app.shift(${b.id}, 'all', 'L')">◀</button>
                                <button class="btn-tool" style="background:#334; padding:4px 8px;" onclick="app.shift(${b.id}, 'all', 'R')">▶</button>
                                <button class="btn-tool" style="background:var(--deep-orange);" onclick="app.manualSort(${b.id})">🗂️ SORT</button>
                                <button class="btn-tool" style="background:var(--accent); color:black;" onclick="app.doubleOctave(${b.id})">💎 Double</button>
                                <button class="btn-tool" style="background:#8b5cf6;" onclick="app.autoChord(${b.id})">🪄 Chord</button>
                                <div style="display:flex; align-items:center; gap:2px; background:#1e293b; padding:2px; border-radius:6px; border:1px solid #334;">
                                    <select id="sel-layer-${b.id}" class="layer-selector">
                                        <option value="all">Semua</option>
                                        <option value="exclude-l1">Ex L1</option>
                                        <option value="l1-only">L1 Only</option>
                                    </select>
                                    <button class="btn-tool" style="background:var(--orange); padding:4px 6px;" onclick="app.quantizeToAngklung(${b.id}, document.getElementById('sel-layer-${b.id}').value)">🪘</button>
                                </div>
                                <button class="btn-tool" style="background:var(--success); color:black;" onclick="app.playSingleBar(${b.id})">🎯 Preview</button>
                                <button onclick="app.deleteBar(${s.id}, ${b.id})" style="margin-left:auto; border:none; color:var(--danger); background:none; cursor:pointer;">✖</button>
                            </div>
                            ${b.grid.map((row, rIdx) => `
                                <div class="grid-row">
                                    <button class="btn-shift" onclick="app.shift(${b.id}, ${rIdx}, 'L')"><</button>
                                    <button class="btn-shift" onclick="app.shift(${b.id}, ${rIdx}, 'R')">></button>
                                    <span style="width:20px; font-size:9px; color:#64748b; text-align:center;">${rIdx==5?'CH':(rIdx+1)}</span>
                                    ${row.map((cell, cIdx) => {
                                        const beatClass = (Math.floor(cIdx / 4) % 2 === 0) ? 'beat-1' : 'beat-2';
                                        return `<input class="grid-cell ${beatClass}" data-loc="${s.id}-${b.id}-${rIdx}-${cIdx}" style="${this.getCellStyle(cell, rIdx==5)}" 
                                        value="${rIdx==5 ? cell : this.numToSmartDisplay(cell)}" 
                                        onmousedown="app.startSelect(${s.id}, ${b.id}, ${rIdx}, ${cIdx})" 
                                        onmouseenter="app.enterSelect(${s.id}, ${b.id}, ${rIdx}, ${cIdx})" 
                                        oninput="app.handleInput(this, ${s.id}, ${b.id}, ${rIdx}, ${cIdx})"
                                        onchange="app.updateGrid(${b.id}, ${rIdx}, ${cIdx}, this.value)">`;
                                    }).join('')}
                                </div>
                            `).join('')}
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    },

    numToSolfege(n) { 
        if(!n || isNaN(n)) return n; 
        const notes = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"]; 
        let v=parseInt(n), oct=Math.floor(v/12)-1, idx=v%12; 
        return notes[idx]+oct; 
    },

    solfegeToNum(s) { 
        if(!s) return "";
        const chromaticMap = { "1/":1, "1\\":1, "2/":3, "2\\":3, "4/":6, "4\\":6, "5/":8, "5\\":8, "6/":10, "6\\":10 };
        const baseMap = { "1":0, "2":2, "3":4, "4":5, "5":7, "6":9, "7":11 };
        
        // Handle Piano Mode (A-G notation)
        if (s.match(/[A-G]/i)) {
            const m = {"C":0,"C#":1,"D":2,"D#":3,"E":4,"F":5,"F#":6,"G":7,"G#":8,"A":9,"A#":10,"B":11}; 
            let match=s.match(/([A-G]#?)(\d)/i); 
            if(match) return (m[match[1].toUpperCase()]+(parseInt(match[2])+1)*12).toString(); 
            return s;
        }

        // Handle Solfege Mode (123 notation)
        let clean = s.replace(/[\.\u0323]/g, '');
        let octave = (s.split('.').length - 1) - (s.split('\u0323').length - 1);
        
        let semi = baseMap[clean[0]] || 0;
        if (chromaticMap[clean]) semi = chromaticMap[clean];

        let midi = 60 + this.keyBase + semi + (octave * 12);
        return midi.toString();
    },

    getCellStyle(val, isChord) { 
        if(!val) return ""; 
        if(isChord) return "background:#fbbf2433 !important; color:var(--gold); border-color:var(--gold);"; 
        const n = this.numToSolfege(val).replace(/[0-9-]/g,''); 
        const c = this.noteColors[n] || '#fff'; 
        return `background:${c}44 !important; color:${c}; border-color:${c}aa;`; 
    },

    initEvents() {
        window.onkeydown = (e) => {
            if (e.ctrlKey && e.key === 'c') { e.preventDefault(); this.copyData(); }
            if (e.ctrlKey && e.key === 'v') { e.preventDefault(); this.pasteData(); }
            if (e.key === 'Delete') { e.preventDefault(); this.deleteSelected(); }
            if (e.key === 'Escape') this.hideAutocomplete();
        };
        window.onmouseup = () => { this.selection.active = false; };
        document.addEventListener('click', (e) => { if(!e.target.classList.contains('grid-cell')) this.hideAutocomplete(); });
    },

    handleInput(el, sId, bId, r, c) {
        if(r === 5) return; 
        const val = el.value.toUpperCase();
        if(!val) { this.hideAutocomplete(); return; }

        if (this.displayMode === 'piano' && isNaN(val[0])) {
            const matches = this.noteList.filter(n => n.startsWith(val)).slice(0, 5);
            if(matches.length > 0) {
                this.showAutocomplete(el, matches, (selected) => {
                    el.value = selected;
                    this.updateGrid(bId, r, c, selected);
                    this.hideAutocomplete();
                });
            } else { this.hideAutocomplete(); }
        } else {
            // Solmisasi Autocomplete Logic
            const num = val[0];
            if ("1234567".includes(num)) {
                let options = [];
                let isKromis = val.includes('/') || val.includes('\\');
                let base = isKromis ? num + (val.includes('/') ? '/' : '\\') : num;
                let displayBase = isKromis ? num + "\u0338" : num;

                options = [
                    { label: displayBase + "\u0323 (Rendah)", val: base + "\u0323" },
                    { label: displayBase + " (Polos)", val: base },
                    { label: displayBase + ". (Tinggi)", val: base + "." },
                    { label: displayBase + ".. (Sangat Tinggi)", val: base + ".." }
                ];

                this.showAutocomplete(el, options.map(o => o.label), (selectedLabel) => {
                    const selectedObj = options.find(o => o.label === selectedLabel);
                    el.value = selectedObj.val;
                    this.updateGrid(bId, r, c, selectedObj.val);
                    this.hideAutocomplete();
                });
            } else { this.hideAutocomplete(); }
        }
    },

    showAutocomplete(target, list, onSelect) {
        const box = document.getElementById('autocomplete-box');
        const rect = target.getBoundingClientRect();
        box.style.display = 'block'; box.style.left = rect.left + 'px';
        box.style.top = (rect.top + rect.height + 2) + 'px'; box.style.width = 'auto';
        box.innerHTML = list.map(item => `<div class="suggest-item">${item}</div>`).join('');
        box.querySelectorAll('.suggest-item').forEach((item, idx) => { 
            item.onclick = (e) => { 
                e.stopPropagation();
                onSelect(list[idx]); 
            }; 
        });
    },

    hideAutocomplete() { document.getElementById('autocomplete-box').style.display = 'none'; },
    setDisplayMode(m) { this.displayMode = m; this.updateModeUI(); this.renderAll(); this.save(); },
    updateModeUI() { document.getElementById('mode-piano').classList.toggle('active', this.displayMode === 'piano'); document.getElementById('mode-solfege').classList.toggle('active', this.displayMode === 'solfege'); },
    setKeyBase(v) { this.keyBase = parseInt(v); this.renderAll(); this.save(); },
    addSection() { const id = Date.now(); this.sections.push({ id, name: "Grup "+(this.sections.length+1), bars: [{ id: id+1, grid: Array(6).fill().map(() => Array(16).fill('')) }], collapsed: false }); this.rebuildTimeline(); this.renderAll(); },
    addBar(sId) { this.sections.find(s => s.id === sId).bars.push({ id: Date.now(), name: "", grid: Array(6).fill().map(() => Array(16).fill('')) }); this.rebuildTimeline(); this.renderAll(); },
    deleteBar(sId, bId) { const s = this.sections.find(x => x.id === sId); s.bars = s.bars.filter(b => b.id !== bId); this.rebuildTimeline(); this.renderAll(); },
    deleteSec(id) { if(confirm("Hapus grup?")) { this.sections = this.sections.filter(s => s.id !== id); this.rebuildTimeline(); this.renderAll(); } },
    updateSecName(id, v) { this.sections.find(s => s.id === id).name = v; this.save(); },
    updateBarName(id, v) { this.getBarById(id).name = v; this.save(); },
    
    updateGrid(bId, r, c, v) { 
        const b = this.getBarById(bId); 
        if(r<5) v = this.solfegeToNum(v); 
        b.grid[r][c] = v; 
        this.renderAll(); this.save(); 
    },

    manualSort(bId) {
        const b = this.getBarById(bId);
        if(b) {
            this.sortNotesInBar(b);
            this.renderAll();
            this.save();
        }
    },

    sortNotesInBar(b) { 
        for(let c=0; c<16; c++) { 
            let notes = []; 
            for(let r=0; r<5; r++) if(b.grid[r][c]) notes.push(parseInt(b.grid[r][c])); 
            let sorted = [...new Set(notes)].sort((a,b) => b-a); 
            for(let r=0; r<5; r++) b.grid[r][c] = sorted[r] ? sorted[r].toString() : ""; 
        } 
    },

    getBarById(id) { for(let s of this.sections) { let b = s.bars.find(x => x.id === id); if(b) return b; } },
    shift(bId, rIdx, dir) { const b = this.getBarById(bId); const move = (a) => dir === 'L' ? a.push(a.shift()) : a.unshift(a.pop()); if(rIdx === 'all') b.grid.forEach(row => move(row)); else move(b.grid[rIdx]); this.renderAll(); this.save(); },
    rebuildTimeline() { this.timeline = []; this.sections.forEach(s => s.bars.forEach(b => this.timeline.push({id: b.id}))); document.getElementById('playback-slider').max = Math.max(0, this.timeline.length * 16 - 1); },
    play() { if(this.isPlaying) { this.isPlaying = false; document.getElementById('play-btn').innerText = '▶ PLAY'; if(this.audio) this.pauseOffset = this.audio.currentTime - this.startTime; } else { if(!this.audio) this.audio = new AudioContext(); this.isPlaying = true; document.getElementById('play-btn').innerText = '⏸ PAUSE'; this.startTime = this.audio.currentTime - this.pauseOffset; this.syncLoop(); } },
    stop() { this.isPlaying = false; this.playLimitStep = -1; document.getElementById('play-btn').innerText = '▶ PLAY'; this.pauseOffset = 0; this.currentBarIdx = -1; this.lastStep = -1; document.getElementById('playback-slider').value = 0; document.getElementById('slider-fill').style.width = '0%'; },
    playSingleBar(bId) {
        const barIdx = this.timeline.findIndex(item => item.id === bId);
        if (barIdx === -1) return;
        const startStep = barIdx * 16;
        this.playLimitStep = startStep + 16;
        this.seek(startStep);
        if (!this.isPlaying) this.play();
    },
    refreshMonitor(idx) {
        if (!this.timeline[idx]) return;
        document.querySelectorAll('.bar-card').forEach(c => c.classList.remove('active-playing'));
        document.getElementById(`bar-card-${this.timeline[idx].id}`)?.classList.add('active-playing');
        const bar = this.getBarById(this.timeline[idx].id);
        for(let r=0; r<6; r++) {
            const lane = document.querySelector(`.lane[data-row="${r}"]`);
            lane.innerHTML = bar.grid[r].map(cell => {
                if(!cell) return '<div></div>';
                const color = r === 5 ? 'var(--gold)' : (this.noteColors[this.numToSolfege(cell).replace(/[0-9-]/g,'')] || '#fff');
                return `<div class="monitor-note" style="background:${color}; box-shadow: 0 0 8px ${color}"></div>`;
            }).join('');
        }
    },
    seek(step) { const tempo = parseFloat(document.getElementById('tempo').value); this.pauseOffset = step * tempo; if(this.isPlaying && this.audio) this.startTime = this.audio.currentTime - this.pauseOffset; this.lastStep = -1; this.refreshMonitor(Math.floor(step/16)); },
    startSelect(sId, bId, r, c) { this.selection.active = true; this.selection.start = { sId, bId, r, c }; this.selection.end = { sId, bId, r, c }; this.updateUISelection(); },
    enterSelect(sId, bId, r, c) { if(this.selection.active) { this.selection.end = { sId, bId, r, c }; this.updateUISelection(); } },
    updateUISelection() { const range = this.getSelectedRange(); document.querySelectorAll('.grid-cell').forEach(el => el.classList.toggle('selected', range.includes(el.getAttribute('data-loc')))); },
    getSelectedRange() { if (!this.selection.start || !this.selection.end) return []; const s = this.selection.start, e = this.selection.end; if (s.bId !== e.bId) return [`${s.sId}-${s.bId}-${s.r}-${s.c}`]; let res = []; for(let r=Math.min(s.r,e.r); r<=Math.max(s.r,e.r); r++) for(let c=Math.min(s.c,e.c); c<=Math.max(s.c,e.c); c++) res.push(`${s.sId}-${s.bId}-${r}-${c}`); return res; },
    copyData() { const range = this.getSelectedRange(); if(!range.length) return; const bar = this.getBarById(this.selection.start.bId); const rMin = Math.min(this.selection.start.r, this.selection.end.r), cMin = Math.min(this.selection.start.c, this.selection.end.c); this.clipboard = range.map(loc => { const [,, r, c] = loc.split('-').map(Number); return { relR: r - rMin, relC: c - cMin, val: bar.grid[r][c] }; }); },
    pasteData() { if (!this.clipboard || !this.selection.start) return; const targetBar = this.getBarById(this.selection.start.bId); this.clipboard.forEach(item => { const tr = this.selection.start.r + item.relR, tc = this.selection.start.c + item.relC; if (tr < 6 && tc < 16) targetBar.grid[tr][tc] = item.val; }); this.renderAll(); this.save(); },
    deleteSelected() { const range = this.getSelectedRange(); if(!range.length) return; const bar = this.getBarById(this.selection.start.bId); range.forEach(loc => { const [,, r, c] = loc.split('-').map(Number); bar.grid[r][c] = ""; }); this.renderAll(); this.save(); },
    exportData() { 
        const title = document.getElementById('song-title').value || 'tabklung_fixed';
        const blob = new Blob([JSON.stringify({ songTitle: title, tempo: document.getElementById('tempo').value, sections: this.sections, keyBase: this.keyBase, displayMode: this.displayMode })], {type:'application/json'}); 
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = title.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '.json'; a.click(); 
    },
    importData(e) { const r = new FileReader(); r.onload = (x) => { 
        const data = JSON.parse(x.target.result); this.sections = data.sections; this.keyBase = data.keyBase || 0; this.displayMode = data.displayMode || 'piano'; document.getElementById('key-base').value = this.keyBase; document.getElementById('song-title').value = data.songTitle || ""; document.getElementById('tempo').value = data.tempo || "0.40"; this.updateModeUI(); this.rebuildTimeline(); this.renderAll(); 
    }; r.readAsText(e.target.files[0]); },
    save() { localStorage.setItem('tabklung_v11.7_fix', JSON.stringify({ songTitle: document.getElementById('song-title').value, tempo: document.getElementById('tempo').value, sections: this.sections, keyBase: this.keyBase, displayMode: this.displayMode })); },
    toggleFold(sId, state) { const s = this.sections.find(x => x.id === sId); if(s) s.collapsed = state; this.renderAll(); this.save(); }
};
app.init();
</script>
